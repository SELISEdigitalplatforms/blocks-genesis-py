[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:cacheprovider
asyncio_mode = auto
consider_namespace_packages = true
markers =
    asyncio: mark a test as an asyncio test
